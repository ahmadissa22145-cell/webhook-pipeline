name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Start Redis
        run: docker run -d -p 6379:6379 redis

      - name: Run migrations
        run: npm run migrate

      - name: Run app
        run: |
          node dist/main.js &
          sleep 5

      - name: Health Check
        run: curl http://localhost:3000 || echo "App running without HTTP endpoint"
