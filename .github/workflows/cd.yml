name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Run full app (Docker Compose)
        run: docker compose up -d --build

      - name: Wait for app
        run: sleep 10

      - name: Check running containers
        run: docker ps
